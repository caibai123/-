name: Build IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd 采白端口/ios
          xcodegen generate

      - name: Build
        run: |
          cd 采白端口/ios
          xcodebuild -project CaiBaiVPN.xcodeproj \
            -scheme CaiBaiVPN \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA
        run: |
          cd 采白端口/ios
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/CaiBaiVPN.app Payload/
          zip -r CaiBaiVPN.ipa Payload
          ls -la CaiBaiVPN.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CaiBaiVPN-IPA
          path: 采白端口/ios/CaiBaiVPN.ipa
          retention-days: 7
