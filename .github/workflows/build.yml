name: Build IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build IPA
        run: |
          cd 采白端口/ios
          xcodebuild -project CaiBaiVPN.xcodeproj \
            -scheme CaiBaiVPN \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CaiBaiVPN-IPA
          path: 采白端口/ios/build/Release-iphoneos/*.ipa
          retention-days: 7
