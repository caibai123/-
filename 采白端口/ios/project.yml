name: CaiBaiVPN
options:
  bundleIdPrefix: com.caibai
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  CaiBaiVPN:
    type: application
    platform: iOS
    sources:
      - path: App
        group: App
      - path: Shared
        group: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.caibai.vpn
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    dependencies:
      - target: PacketTunnelExtension
        embed: true
        codeSign: true
        buildPhase:
          copyFiles:
            destination: plugins
    entitlements:
      path: App/App.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.developer.networking.vpn.api:
          - allow-vpn

  PacketTunnelExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel
        group: PacketTunnel
      - path: Shared
        group: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.caibai.vpn.PacketTunnel
        INFOPLIST_FILE: PacketTunnel/Info.plist
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
    entitlements:
      path: PacketTunnel/PacketTunnel.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.developer.networking.vpn.api:
          - allow-vpn
