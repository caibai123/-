name: CaiBaiVPN
options:
  bundleIdPrefix: com.caibai
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top
  projectFormat: Xcode 14.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  CaiBaiVPN:
    type: application
    platform: iOS
    sources:
      - path: App
        type: group
      - path: Shared
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.caibai.vpn
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        CODE_SIGNING_ALLOWED: "NO"
        CLANG_ENABLE_MODULES: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - target: PacketTunnelExtension
        embed: true
        codeSign: false

  PacketTunnelExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel
        type: group
      - path: Shared
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.caibai.vpn.PacketTunnel
        INFOPLIST_FILE: PacketTunnel/Info.plist
        SKIP_INSTALL: YES
        CODE_SIGNING_ALLOWED: "NO"
        CLANG_ENABLE_MODULES: YES
        SWIFT_EMIT_LOC_STRINGS: YES
