name: CaiBaiVPN
options:
  bundleIdPrefix: com.caibai
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  CaiBaiVPN:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.caibai.vpn
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        CODE_SIGNING_ALLOWED: "NO"
    dependencies:
      - target: PacketTunnelExtension
        embed: true

  PacketTunnelExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.caibai.vpn.PacketTunnel
        INFOPLIST_FILE: PacketTunnel/Info.plist
        SKIP_INSTALL: YES
        CODE_SIGNING_ALLOWED: "NO"
